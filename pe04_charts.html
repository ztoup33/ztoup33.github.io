function renderChart(specKey) {

  const d = SPECS[specKey];
  const phases = d.phases;
  const stats  = d.stats;

  const q1Data  = phases.map(ph => stats[ph]?.q1     ?? null);
  const q3Data  = phases.map(ph => stats[ph]?.q3     ?? null);
  const medData = phases.map(ph => stats[ph]?.median ?? null);
  const minData = phases.map(ph => stats[ph]?.min    ?? null);
  const maxData = phases.map(ph => stats[ph]?.max    ?? null);

  // Scatter: each score as {x: label, y: value}
  const scatterData = [];
  phases.forEach(ph => {
    if (stats[ph]) stats[ph].scores.forEach(s => scatterData.push({x: ph, y: s}));
  });

  const cards = phases.map(ph => {
    if (!stats[ph]) return '';
    const s = stats[ph];
    return `<div class="stat-card">
      <div class="stat-phase">${ph}</div>
      <div class="stat-med">${s.median.toFixed(2)}</div>
      <div class="stat-range">${s.min.toFixed(1)} – ${s.max.toFixed(1)}</div>
      <div class="stat-n">n=${s.count} περιοχές</div>
    </div>`;
  }).join('');

  const allScores = phases.flatMap(ph => stats[ph]?.scores ?? []).sort((a,b) => a-b);
  const globalMin = allScores[0];
  const globalMax = allScores[allScores.length - 1];
  const mid = Math.floor(allScores.length / 2);

    ? (allScores[mid-1] + allScores[mid]) / 2
    : allScores[mid];

          tension: 0.1,
          fill: false,
          order: 1,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: item => item.dataset.label !== 'Q1' && item.dataset.label !== 'Q3',
          callbacks: {
            title: items => {
              const ph = items[0].label;
              const s = stats[ph];
              return ph + (s ? ` (${s.count} περιοχές)` : '');
            },
            label: ctx => {
              const ph = ctx.label;
              const s = stats[ph];
              if (!s) return '';
              switch(ctx.dataset.label) {
                case 'Διάμεσος': return `Διάμεσος: ${s.median.toFixed(2)} μόρια`;
                case 'Min':      return `Min: ${s.min.toFixed(2)} μόρια`;
                case 'Max':      return `Max: ${s.max.toFixed(2)} μόρια`;
                case 'Περιοχή': return `${ctx.raw?.y?.toFixed(2)} μόρια`;
                default:        return '';
              }
            }
          }
        }
      },
      scales: {
        x: { grid: { color:'#f0f2f8' }, ticks: { font:{ size:11 } } },
        y: {
          grid: { color:'#f0f2f8' },
          title: { display:true, text:'Μόρια κατωφλίου', font:{ size:11 } },
          ticks: { font:{ size:11 } }
        }
      }
    }
  });
}

function showSpec(key, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + key).classList.add('active');
  renderChart(key);
}

// Pre-select spec from URL param e.g. ?spec=ΠΕ04.02
(function() {
  const param = new URLSearchParams(window.location.search).get('spec');
  const valid = ['ΠΕ04.01','ΠΕ04.02','ΠΕ04.04','ΠΕ04.05'];
  const initial = valid.includes(param) ? param : 'ΠΕ04.01';
  if (initial !== 'ΠΕ04.01') {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.textContent.trim().startsWith(initial));
    });
    document.querySelectorAll('.panel').forEach(p => {
      p.classList.toggle('active', p.id === 'panel-' + initial);
    });
  }
  renderChart(initial);
})();
</script>
</body>
</html>
